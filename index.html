<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍫 Amigo Ovo Premium</title>

<style>
:root{
  --choco-dark:#2E1B16;
  --choco:#4E342E;
  --choco-light:#8D6E63;
  --cream:#EFEBE9;
  --gold:#FFD700;
}

body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #4E342E, #2E1B16);
  color:var(--cream);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  width:95%;
  max-width:420px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius:20px;
  padding:25px;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

h1{
  text-align:center;
  color:var(--gold);
}

.sub{
  text-align:center;
  margin-bottom:20px;
  opacity:0.8;
}

.lista{
  max-height:250px;
  overflow:auto;
}

.nome{
  padding:12px;
  margin:6px 0;
  border-radius:12px;
  background: rgba(255,255,255,0.05);
  cursor:pointer;
  transition:0.3s;
}

.nome:hover{
  background: rgba(255,215,0,0.2);
  transform:scale(1.02);
}

.selected{
  background: linear-gradient(45deg,var(--gold),#ffea70);
  color:#000;
  font-weight:bold;
  box-shadow:0 0 15px var(--gold);
}

button{
  width:100%;
  padding:15px;
  margin-top:15px;
  border:none;
  border-radius:15px;
  background: linear-gradient(45deg,#5D4037,#3E2723);
  color:var(--gold);
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px var(--gold);
}

.result{
  margin-top:20px;
  text-align:center;
  font-size:20px;
}

.admin{
  position:absolute;
  top:10px;
  right:15px;
  font-size:14px;
  cursor:pointer;
  color:var(--gold);
}

</style>
</head>

<body>

<div class="container">

<div class="admin" onclick="abrirADM()">Modo ADM</div>

<h1>🍫 Amigo Ovo</h1>
<div class="sub">Escolha seu nome</div>

<div class="lista" id="lista"></div>

<button onclick="sortear()">Sortear 🍫</button>

<div class="result" id="resultado"></div>

</div>

<script>

const participantes = [
"Anna Paula","Benjamin","Eloá","Fábia","Gabriel","Isabela (namorada Benjamin)",
"Isabela Fá","Judah","Levi","Maxwell","Paula","Richard","Samuel","Vinólia","Yasmin"
];

// RESTRIÇÕES (famílias)
const restricoes = {
"Richard":["Anna Paula","Benjamin","Judah","Levi"],
"Anna Paula":["Richard","Benjamin","Judah","Levi"],
"Benjamin":["Richard","Anna Paula","Judah","Levi","Isabela (namorada Benjamin)"],
"Judah":["Richard","Anna Paula","Benjamin","Levi"],
"Levi":["Richard","Anna Paula","Benjamin","Judah"],

"Paula":["Samuel","Maxwell","Yasmin"],
"Samuel":["Paula","Maxwell","Yasmin"],
"Maxwell":["Paula","Samuel","Yasmin"],
"Yasmin":["Paula","Samuel","Maxwell"],

"Vinólia":[],

"Fábia":["Gabriel","Eloá","Isabela Fá"],
"Gabriel":["Fábia","Eloá","Isabela Fá"],
"Eloá":["Fábia","Gabriel","Isabela Fá"],
"Isabela Fá":["Fábia","Gabriel","Eloá"],

"Isabela (namorada Benjamin)": ["Benjamin"]
};

let selecionado = null;
let sorteioFinal = JSON.parse(localStorage.getItem("sorteio")) || gerarSorteio();
let jaSortearam = JSON.parse(localStorage.getItem("jaSortearam")) || [];

function render(){
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  participantes.sort().forEach(nome=>{
    const div = document.createElement("div");
    div.className = "nome";
    div.innerText = nome;

    div.onclick = ()=>{
      selecionado = nome;
      document.querySelectorAll(".nome").forEach(n=>n.classList.remove("selected"));
      div.classList.add("selected");
    };

    lista.appendChild(div);
  });
}

function gerarSorteio(){
  let tentativas=0;

  while(tentativas<2000){
    let disponiveis=[...participantes];
    let resultado={};
    let valido=true;

    for(let pessoa of participantes){
      let opcoes = disponiveis.filter(p=>
        p!==pessoa && !(restricoes[pessoa]||[]).includes(p)
      );

      if(opcoes.length===0){valido=false;break;}

      let escolhido = opcoes[Math.floor(Math.random()*opcoes.length)];
      resultado[pessoa]=escolhido;
      disponiveis = disponiveis.filter(p=>p!==escolhido);
    }

    if(valido) return resultado;
    tentativas++;
  }

  alert("Erro no sorteio");
}

function sortear(){
  if(!selecionado) return alert("Selecione seu nome");

  if(jaSortearam.includes(selecionado)){
    return alert("Você já sorteou!");
  }

  const resultado = sorteioFinal[selecionado];

  document.getElementById("resultado").innerHTML =
    `🎁 Você tirou:<br><span style="color:gold;font-size:26px">${resultado}</span>`;

  jaSortearam.push(selecionado);

  localStorage.setItem("jaSortearam", JSON.stringify(jaSortearam));
  localStorage.setItem("sorteio", JSON.stringify(sorteioFinal));
}

function abrirADM(){
  const senha = prompt("Senha ADM:");

  if(senha !== "1234") return;

  let lista = participantes.map(nome=>{
    return `${nome} → ${jaSortearam.includes(nome) ? "✅" : "⏳"}`;
  }).join("\n");

  alert(lista);
}

render();

</script>

</body>
</html>
