<!-- Código JavaScript movido para o final do body -->
</div>

<script>
// --- BLOQUEIO DE ACESSO ÚNICO ---
const LOCK_KEY = "amigoPascoaLock";
const LOCK_TIMEOUT = 60 * 1000; // 1 minuto
let lockInterval = null;

function setLock() {
  const now = Date.now();
  localStorage.setItem(LOCK_KEY, JSON.stringify({ timestamp: now, id: myLockId }));
}

function getLock() {
  const data = localStorage.getItem(LOCK_KEY);
  if (!data) return null;
  try { return JSON.parse(data); } catch { return null; }
}

function clearLock() {
  const lock = getLock();
  if (lock && lock.id === myLockId) {
    localStorage.removeItem(LOCK_KEY);
  }
}

function checkLock() {
  const lock = getLock();
  const now = Date.now();
  if (!lock) return false;
  if (now - lock.timestamp > LOCK_TIMEOUT) {
    // Expirou
    localStorage.removeItem(LOCK_KEY);
    return false;
  }
  if (lock.id !== myLockId) return true;
  return false;
}

function refreshLock() {
  setLock();
}

function startLockInterval() {
  lockInterval = setInterval(refreshLock, 20000); // Atualiza lock a cada 20s
}

function stopLockInterval() {
  if (lockInterval) clearInterval(lockInterval);
}

// Gera um id único para esta aba
const myLockId = Math.random().toString(36).substr(2) + Date.now();

function showLockModal() {
  const modal = document.createElement("div");
  modal.innerHTML = `
  <div style="
    position:fixed;top:0;left:0;width:100vw;height:100vh;
    background:rgba(46,27,22,0.97);z-index:99999;display:flex;align-items:center;justify-content:center;">
    <div style="background:linear-gradient(135deg,#4E342E 80%,#FFD700 120%);padding:32px 24px;border-radius:20px;box-shadow:0 0 30px #FFD70099;text-align:center;max-width:90vw;">
      <h2 style="color:#FFD700;font-size:1.3em;margin-bottom:18px;">Aguarde um momento</h2>
      <div style="color:#EFEBE9;font-size:1.1em;">Outra pessoa está finalizando o sorteio.<br>Por favor, tente novamente em até 1 minuto.</div>
    </div>
  </div>
  `;
  document.body.appendChild(modal);
}

// Ao abrir a página, verifica o lock
window.addEventListener('DOMContentLoaded', () => {
  const lock = getLock();
  const now = Date.now();
  // Se o lock for do próprio usuário, ignora e renova
  if (lock && lock.id === myLockId) {
    setLock();
    startLockInterval();
    return;
  }
  // Se o lock for de outro usuário e ainda válido, bloqueia
  if (lock && lock.id !== myLockId && now - lock.timestamp <= LOCK_TIMEOUT) {
    showLockModal();
    return;
  }
  // Se não há lock ou lock expirou, assume o lock
  setLock();
  startLockInterval();
});

// Ao fechar a aba, libera o lock
window.addEventListener('beforeunload', () => {
  clearLock();
  stopLockInterval();
});

// Se outro usuário pegar o lock, mostra modal imediatamente
window.addEventListener('storage', (e) => {
  if (e.key === LOCK_KEY && checkLock()) {
    showLockModal();
  }
});
</script>
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍫 Amigo Secreto Ovos de Páscoa</title>

<style>

  --choco-dark:#2E1B16;
  --choco:#4E342E;
  --choco-light:#8D6E63;
  --cream:#EFEBE9;
  --gold:#FFD700;

  margin:0;
  font-family: 'Segoe UI', sans-serif;

    linear-gradient(rgba(46,27,22,0.82),rgba(46,27,22,0.92)),

  text-align:center;

  width:100%;
  padding:15px;

  border:none;
  border-radius:15px;
  background: linear-gradient(45deg,#5D4037,#3E2723);
  color:var(--gold);
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px var(--gold);
}

  margin-top:20px;
  text-align:center;
  font-size:20px;
}

.admin{
  position:absolute;
  top:10px;

  font-size:14px;
  cursor:pointer;

<body>

<div class="container">

<div class="admin" onclick="abrirADM()">Modo ADM</div>

<h1>🍫 Amigo Secreto Ovos de Páscoa</h1>
<div class="sub">Escolha seu nome</div>
<div id="contadores" style="text-align:center;margin-bottom:10px;font-size:1.08em;color:#FFD700;font-weight:600;"></div>

<div style="position:relative;max-width:340px;margin:0 auto;">
  <button id="abrirListaBtn" type="button" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;font-size:1.1em;background:rgba(141,110,99,0.13);border-radius:14px;border:none;box-shadow:0 2px 8px #4E342E33;cursor:pointer;color:#FFD700;font-family:inherit;outline:none;transition:box-shadow 0.2s;">
    <span id="nomeSelecionado">Selecione seu nome</span>
    <span style="font-size:1.3em;transition:transform 0.3s;" id="setaLista">▼</span>
  </button>
  <div class="lista" id="lista" style="display:none;position:absolute;top:110%;left:0;width:100%;background:rgba(46,27,22,0.98);border-radius:16px;box-shadow:0 8px 32px #4E342Ecc;z-index:10;max-height:320px;overflow:auto;padding:8px 0;"></div>
</div>
<button onclick="sortear()">Sortear 🍫</button>
<div class="result" id="resultado"></div>

</div>

<script>

const participantes = [
  "Anna Paula","Benjamin","Eloá","Fábia","Gabriel","Isabela (namorada Benjamin)",
  "Isabela Fá","Judah","Levi","Maxwell","Paula","Richard","Samuel","Vinólia","Yasmin"
];

// RESTRIÇÕES (famílias)
const restricoes = {
"Richard":["Anna Paula","Benjamin","Judah","Levi"],
"Anna Paula":["Richard","Benjamin","Judah","Levi"],
"Benjamin":["Richard","Anna Paula","Judah","Levi","Isabela (namorada Benjamin)"],
"Judah":["Richard","Anna Paula","Benjamin","Levi"],
"Levi":["Richard","Anna Paula","Benjamin","Judah"],

"Paula":["Samuel","Maxwell","Yasmin"],
"Samuel":["Paula","Maxwell","Yasmin"],
"Maxwell":["Paula","Samuel","Yasmin"],
"Yasmin":["Paula","Samuel","Maxwell"],

"Vinólia":[],

"Fábia":["Gabriel","Eloá","Isabela Fá"],
"Gabriel":["Fábia","Eloá","Isabela Fá"],
"Eloá":["Fábia","Gabriel","Isabela Fá"],
"Isabela Fá":["Fábia","Gabriel","Eloá"],

"Isabela (namorada Benjamin)": ["Benjamin"]
};

let selecionado = null;
let listaAberta = false;
function atualizarContadores() {
  const total = participantes.length;
  const concluidos = jaSortearam.length;
  const faltam = total - concluidos;
  document.getElementById('contadores').innerHTML = `Já sortearam: <span style="color:#EFEBE9">${concluidos}</span> &nbsp; | &nbsp; Faltam: <span style="color:#EFEBE9">${faltam}</span>`;
}
let sorteioFinal = JSON.parse(localStorage.getItem("sorteio")) || gerarSorteio();
let jaSortearam = JSON.parse(localStorage.getItem("jaSortearam")) || [];
let resultadosSorteio = JSON.parse(localStorage.getItem("resultadosSorteio")) || {};

function render(){
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const listaDiv = document.getElementById("lista");
  listaDiv.innerHTML = "";
  // Só mostra quem ainda não sorteou
  participantes.filter(nome => !jaSortearam.includes(nome)).sort().forEach(nome=>{
    const div = document.createElement("div");
    div.className = "nome";
    div.innerText = nome;
    div.tabIndex = 0;
    div.setAttribute('role','button');
    div.setAttribute('aria-label',`Selecionar ${nome}`);
    div.onclick = ()=>{
      selecionado = nome;
      document.querySelectorAll(".nome").forEach(n=>n.classList.remove("selected"));
      div.classList.add("selected");
      document.getElementById('nomeSelecionado').innerText = nome;
      listaDiv.style.display = "none";
      listaAberta = false;
      document.getElementById('setaLista').style.transform = "rotate(0deg)";
    };
    div.onkeydown = (e)=>{
      if(e.key==='Enter'||e.key===' '){
        div.click();
      }
    };
    listaDiv.appendChild(div);
  });
  atualizarContadores();
}
// Lógica para abrir/fechar lista premium
document.getElementById('abrirListaBtn').onclick = function(){
  const listaDiv = document.getElementById('lista');
  listaAberta = !listaAberta;
  listaDiv.style.display = listaAberta ? "block" : "none";
  document.getElementById('setaLista').style.transform = listaAberta ? "rotate(180deg)" : "rotate(0deg)";
};

// Fecha lista se clicar fora
document.addEventListener('click', function(e){
  const btn = document.getElementById('abrirListaBtn');
  const listaDiv = document.getElementById('lista');
  if(!btn.contains(e.target) && !listaDiv.contains(e.target)){
    listaDiv.style.display = "none";
    listaAberta = false;
    document.getElementById('setaLista').style.transform = "rotate(0deg)";
  }
});

function gerarSorteio(){
  let tentativas=0;

  while(tentativas<2000){
    let disponiveis=[...participantes];
    let resultado={};
    let valido=true;

    for(let pessoa of participantes){
      let opcoes = disponiveis.filter(p=>
        p!==pessoa && !(restricoes[pessoa]||[]).includes(p)
      );

      if(opcoes.length===0){valido=false;break;}

      let escolhido = opcoes[Math.floor(Math.random()*opcoes.length)];
      resultado[pessoa]=escolhido;
      disponiveis = disponiveis.filter(p=>p!==escolhido);
    }

    if(valido) return resultado;
    tentativas++;
  }

  alert("Erro no sorteio");
}

function sortear(){
  if(!selecionado) return alert("Selecione seu nome");

  if(jaSortearam.includes(selecionado)){
    return alert("Você já sorteou!");
  }

  const resultado = sorteioFinal[selecionado];

  confete();
  mostrarModal(resultado);

  jaSortearam.push(selecionado);
  resultadosSorteio[selecionado] = resultado;

  localStorage.setItem("jaSortearam", JSON.stringify(jaSortearam));
  localStorage.setItem("sorteio", JSON.stringify(sorteioFinal));
  localStorage.setItem("resultadosSorteio", JSON.stringify(resultadosSorteio));

  // Remove o nome da lista e atualiza contadores
  selecionado = null;
  document.getElementById('nomeSelecionado').innerText = 'Selecione seu nome';
  render();
}

function confete(){
  for(let i=0;i<100;i++){
    let div = document.createElement("div");
    div.style.position="fixed";
    div.style.width="8px";
    div.style.height="8px";
    div.style.background="#FFD700";
    div.style.top=Math.random()*100+"%";
    div.style.left=Math.random()*100+"%";
    div.style.zIndex="999";
    div.style.borderRadius="50%";
    div.style.opacity = 0.85;
    div.style.boxShadow = "0 0 8px #FFD700, 0 0 2px #EFEBE9";
    div.style.transition = "transform 2s cubic-bezier(.2,1.2,.4,1), opacity 2s";
    setTimeout(()=>{
      div.style.transform = `translateY(${60+Math.random()*40}vh) scale(${0.7+Math.random()*0.6}) rotate(${Math.random()*360}deg)`;
      div.style.opacity = 0;
    },10);
    document.body.appendChild(div);
    setTimeout(()=>div.remove(),2000);
  }
}

function mostrarModal(nome){
  const modal = document.createElement("div");
  modal.innerHTML = `
  <div style="
    position:fixed;
    top:0;left:0;
    width:100vw;
    height:100vh;
    background:rgba(46,27,22,0.97);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    animation:fadeInBg 0.5s;
  ">
    <div style="
      background:linear-gradient(135deg,#2E1B16 80%,#FFD700 120%);
      padding:32px 24px 28px 24px;
      border-radius:24px;
      text-align:center;
      color:#EFEBE9;
      box-shadow:0 0 40px 0 #FFD70099, 0 8px 32px #4E342Ecc;
      min-width:240px;
      max-width:90vw;
      animation:popIn 0.6s cubic-bezier(.4,1.4,.6,1);
      position:relative;
    ">
      <h2 style="font-family:'Playfair Display',serif;font-size:1.3em;color:#FFD700;text-shadow:0 0 12px #FFD70099,0 2px 8px #4E342E;">🎁 Você tirou:</h2>
      <h1 style="color:#FFD700;font-size:2.3em;letter-spacing:0.02em;text-shadow:0 0 18px #FFD700,0 2px 12px #4E342E;font-family:'Playfair Display',serif;animation:shine 2s infinite alternate;">${nome}</h1>
      <button onclick="location.reload()" style="
        padding:12px 32px;
        margin-top:24px;
        border:none;
        border-radius:12px;
        background:linear-gradient(90deg,#FFD700 60%,#EFEBE9 100%);
        color:#2E1B16;
        font-size:1.1em;
        font-weight:bold;
        box-shadow:0 0 12px #FFD70099;
        cursor:pointer;
        transition:0.2s;
      ">Fechar</button>
    </div>
  </div>
  <style>
    @keyframes popIn{0%{transform:scale(0.7);opacity:0;}100%{transform:scale(1);opacity:1;}}
    @keyframes fadeInBg{0%{opacity:0;}100%{opacity:1;}}
    @keyframes shine{0%{filter:brightness(1);}100%{filter:brightness(1.18) drop-shadow(0 0 16px #FFD700);}}
  </style>
  `;
  document.body.appendChild(modal);
}

function abrirADM(){
  const senha = prompt("Senha ADM:");

  if(senha !== "1234") return;

  let lista = participantes.map(nome=>{
    let status = jaSortearam.includes(nome) ? "✅" : "⏳";
    let resultado = resultadosSorteio[nome] ? `→ ${resultadosSorteio[nome]}` : "";
    return `${nome} ${status} ${resultado}`;
  }).join("\n");

  alert(lista);
}

render();
atualizarContadores();

</script>

</body>
