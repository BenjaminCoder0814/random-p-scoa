<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍫 Amigo Secreto Ovos de Páscoa</title>

<style>
:root{
  --choco-dark:#2E1B16;
  --choco:#4E342E;
  --choco-light:#8D6E63;
  --cream:#EFEBE9;
  --gold:#FFD700;
}

body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:
    linear-gradient(rgba(46,27,22,0.82),rgba(46,27,22,0.92)),
    url('chocolate.avif') center top/cover no-repeat fixed;
  color:var(--cream);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  width:95%;
  max-width:420px;
  background: rgba(46,27,22,0.92);
  backdrop-filter: blur(15px);
  border-radius:20px;
  padding:25px;
  box-shadow:0 10px 40px #4E342E99;
}

h1{
  text-align:center;
  color:var(--gold);
}

.sub{
  text-align:center;
  margin-bottom:20px;
  opacity:0.8;
}

.lista{
  max-height:250px;
  overflow:auto;
}

.nome{
  padding:12px;
  margin:6px 0;
  border-radius:12px;
  background: rgba(141,110,99,0.13);
  cursor:pointer;
  transition:0.3s;
}

.nome:hover{
  background: rgba(255,215,0,0.2);
  transform:scale(1.02);
}

.selected{
  background: linear-gradient(45deg,var(--gold),#FFD700cc);
  color:var(--choco-dark);
  font-weight:bold;
  box-shadow:0 0 15px var(--gold);
}

button{
  width:100%;
  padding:15px;
  margin-top:15px;
  border:none;
  border-radius:15px;
  background: linear-gradient(45deg,#5D4037,#3E2723);
  color:var(--gold);
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px var(--gold);
}

.result{
  margin-top:20px;
  text-align:center;
  font-size:20px;
}

.admin{
  position:absolute;
  top:10px;
  right:15px;
  font-size:14px;
  cursor:pointer;
  color:var(--gold);
}

</style>
</head>

<body>

<div class="container">


<h1>🍫 Amigo Secreto Ovos de Páscoa</h1>


<div style="margin: 0 auto; max-width: 340px;">
  <label for="nomeSelect" style="display:block;margin-bottom:10px;color:#FFD700;font-size:1.1em;letter-spacing:0.01em;">Selecione seu nome:</label>
  <div style="position:relative;">
    <select id="nomeSelect" style="width:100%;padding:16px 18px 16px 44px;border-radius:14px;border:none;font-size:1.13em;background:rgba(141,110,99,0.22);color:#FFD700;margin-bottom:14px;outline:none;box-shadow:0 2px 8px #4E342E33;appearance:none;-webkit-appearance:none;position:relative;font-family:inherit;">
      <option value="" disabled selected hidden>Selecione seu nome</option>
      <option>Anna Paula</option>
      <option>Benjamin</option>
      <option>Eloá</option>
      <option>Fábia</option>
      <option>Gabriel</option>
      <option>Isabela (namorada Benjamin)</option>
      <option>Isabela Fá</option>
      <option>Judah</option>
      <option>Levi</option>
      <option>Maxwell</option>
      <option>Paula</option>
      <option>Richard</option>
      <option>Samuel</option>
      <option>Vinólia</option>
      <option>Yasmin</option>
    </select>
    <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:1.3em;color:#FFD700;pointer-events:none;">🍫</span>
    <span style="position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:1.2em;color:#FFD700;pointer-events:none;">▼</span>
  </div>
  <input id="senhaInput" type="password" placeholder="Digite sua senha" style="width:100%;padding:12px 14px;border-radius:12px;border:none;font-size:1.1em;background:rgba(141,110,99,0.13);color:#FFD700;margin-bottom:14px;outline:none;letter-spacing:0.08em;" autocomplete="off">
  <button id="verResultadoBtn" style="width:100%;padding:15px;border:none;border-radius:15px;background: linear-gradient(90deg,#FFD700 60%,#8D6E63 100%);color:#2E1B16;font-size:18px;cursor:pointer;transition:0.3s;font-weight:bold;box-shadow:0 0 12px #FFD70033;letter-spacing:0.01em;">Ver meu amigo secreto 🍫</button>
  <div class="result" id="resultado"></div>
</div>

</div>


<script>
// Lista fixa de resultados
const resultados = {
  "Anna Paula": "Gabriel",
  "Benjamin": "Isabela Fá",
  "Eloá": "Samuel",
  "Fábia": "Levi",
  "Gabriel": "Maxwell",
  "Isabela (namorada Benjamin)": "Anna Paula",
  "Isabela Fá": "Richard",
  "Judah": "Yasmin",
  "Levi": "Vinólia",
  "Maxwell": "Fábia",
  "Paula": "Eloá",
  "Richard": "Isabela (namorada Benjamin)",
  "Samuel": "Benjamin",
  "Vinólia": "Paula",
  "Yasmin": "Judah"
};

// Senhas individuais (aleatórias, 6 dígitos)
const senhas = {
  "Anna Paula": "492731",
  "Benjamin": "185604",
  "Eloá": "736259",
  "Fábia": "520183",
  "Gabriel": "964217",
  "Isabela (namorada Benjamin)": "308652",
  "Isabela Fá": "871940",
  "Judah": "154893",
  "Levi": "629570",
  "Maxwell": "417285",
  "Paula": "203698",
  "Richard": "758120",
  "Samuel": "346917",
  "Vinólia": "589134",
  "Yasmin": "672305"
};

function mostrarModal(nome, amigo) {
  const modal = document.createElement("div");
  modal.innerHTML = `
  <div style="
    position:fixed;top:0;left:0;width:100vw;height:100vh;
    background:rgba(46,27,22,0.97);z-index:99999;display:flex;align-items:center;justify-content:center;">
    <div style="background:linear-gradient(135deg,#2E1B16 80%,#FFD700 120%);padding:32px 24px 28px 24px;border-radius:24px;text-align:center;color:#EFEBE9;box-shadow:0 0 40px 0 #FFD70099, 0 8px 32px #4E342Ecc;min-width:240px;max-width:90vw;animation:popIn 0.6s cubic-bezier(.4,1.4,.6,1);position:relative;">
      <h2 style="font-family:'Playfair Display',serif;font-size:1.3em;color:#FFD700;text-shadow:0 0 12px #FFD70099,0 2px 8px #4E342E;">🎁 Você tirou:</h2>
      <h1 style="color:#FFD700;font-size:2.3em;letter-spacing:0.02em;text-shadow:0 0 18px #FFD700,0 2px 12px #4E342E;font-family:'Playfair Display',serif;animation:shine 2s infinite alternate;">${amigo}</h1>
      <button onclick="this.closest('div[style*='position:fixed']').remove()" style="padding:12px 32px;margin-top:24px;border:none;border-radius:12px;background:linear-gradient(90deg,#FFD700 60%,#EFEBE9 100%);color:#2E1B16;font-size:1.1em;font-weight:bold;box-shadow:0 0 12px #FFD70099;cursor:pointer;transition:0.2s;">Fechar</button>
    </div>
  </div>
  <style>
    @keyframes popIn{0%{transform:scale(0.7);opacity:0;}100%{transform:scale(1);opacity:1;}}
    @keyframes shine{0%{filter:brightness(1);}100%{filter:brightness(1.18) drop-shadow(0 0 16px #FFD700);}}
  </style>
  `;
  document.body.appendChild(modal);
}

document.getElementById('verResultadoBtn').onclick = function() {
  const select = document.getElementById('nomeSelect');
  const nome = select.value;
  const senha = document.getElementById('senhaInput').value;
  const resultadoDiv = document.getElementById('resultado');
  if (!nome) {
    resultadoDiv.innerHTML = `<div style='color:#FFD700;margin-top:18px;'>Selecione seu nome!</div>`;
    return;
  }
  if (!senha) {
    resultadoDiv.innerHTML = `<div style='color:#FFD700;margin-top:18px;'>Digite sua senha!`;
    return;
  }
  if (senhas[nome] && senha === senhas[nome]) {
    mostrarModal(nome, resultados[nome]);
    resultadoDiv.innerHTML = "";
  } else {
    resultadoDiv.innerHTML = `<div style='color:#FFD700;margin-top:18px;'>Senha incorreta!</div>`;
  }
};
</script>

</body>
</html>
